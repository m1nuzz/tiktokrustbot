<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='11093538' data-sdk='show_11093538' onerror="window._sdkLoadFailed = true" onload="window._sdkLoaded = true"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            z-index: 10;
        }

        .glass-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 60px;
            border-radius: 16px;
            border: none;
            background-color: var(--accent-color);
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-success {
            background-color: var(--success-color);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.05);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .blob {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--accent-color);
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 1;
        }
        .blob-1 { top: 10%; left: -10%; }
        .blob-2 { bottom: 10%; right: -10%; background: #818cf8; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <!-- Persistent Loader -->
        <div id="loader-view" class="spinner-container">
            <div class="spinner"></div>
            <h2 id="loader-text" style="font-size: 18px; color: var(--text-primary); margin: 0;">Loading...</h2>
            <span id="loader-subtext" style="font-size: 14px; color: var(--text-secondary);">Connecting to servers</span>
        </div>

        <!-- Result Card -->
        <div id="content-view" class="glass-card hidden">
            <h1 id="title">Success!</h1>
            <p id="description">Your ad view has been verified. You can now claim your video.</p>
            
            <button id="ad-btn" class="btn hidden">🎬 Start Ad Manually</button>
            <button id="direct-btn" class="btn hidden">🚀 Continue to Bot</button>
            
            <div id="status-message" style="margin-top: 20px; font-size: 14px;"></div>
        </div>
    </div>

    <script>
        // SMARTLINK_INJECT
        // ========== КОНФИГУРАЦИЯ ==========
        const AD_CONFIG = {
            zone: '11093538',
            sdkFn: 'show_11093538',
            smartLink: typeof AD_CONFIG_SMARTLINK !== 'undefined' ? AD_CONFIG_SMARTLINK : 'https://omg10.com/4/11148490',
            maxRetries: 8,
            retryInterval: 1200,
            pollInterval: 3000,
            maxSmartLinkPolls: 20 // 60 секунд / 3 секунды
        };

        // ========== СОСТОЯНИЕ ==========
        let retryCount = 0;
        let retryTimerId = null;
        let pollTimeoutId = null;
        let isPolling = false;
        let smartLinkPollCount = 0;
        let currentAdSource = null; // 'sdk' или 'smartlink'

        const tg = window.Telegram.WebApp;
        const loaderView = document.getElementById('loader-view');
        const loaderText = document.getElementById('loader-text');
        const loaderSubtext = document.getElementById('loader-subtext');
        const contentView = document.getElementById('content-view');
        const adBtn = document.getElementById('ad-btn');
        const directBtn = document.getElementById('direct-btn');
        const statusMsg = document.getElementById('status-message');
        const description = document.getElementById('description');
        const urlParams = new URLSearchParams(window.location.search);
        const rawYmid = urlParams.get('ymid');
        
        // Автоопределение языка: из URL (от бота) или из Telegram WebApp
        const langParam = urlParams.get('lang');
        const tgLang = window.Telegram?.WebApp?.initDataUnsafe?.user?.language_code;
        const userLang = langParam || tgLang || 'en';

        // Переводы для 5 языков (как в Rust коде)
        const translations = {
            en: {
                sessionError: "Session Error",
                sessionErrorMsg: "Could not identify your request. The link has expired or was opened incorrectly. Return to the bot and press the download button again.",
                sending: "Sending your video to chat...",
                pleaseWait: "Please wait...",
                success: "✅ Video successfully sent to chat!",
                returning: "Returning to bot...",
                error: "Error",
                errorMsg: "❌ Failed to deliver video",
                networkError: "Network Error",
                networkErrorMsg: "❌ Could not connect to server. Check your internet.",
                retry: "🔄 Try Again"
            },
            ru: {
                sessionError: "Ошибка сессии",
                sessionErrorMsg: "Не удалось определить ваш запрос. Ссылка устарела или открыта некорректно. Вернитесь в бот и нажмите кнопку скачивания еще раз.",
                sending: "Отправляем ваше видео в чат...",
                pleaseWait: "Пожалуйста, подождите...",
                success: "✅ Видео успешно отправлено в чат!",
                returning: "Возвращаемся в бот...",
                error: "Ошибка",
                errorMsg: "❌ Не удалось выдать видео",
                networkError: "Ошибка сети",
                networkErrorMsg: "❌ Не удалось подключиться к серверу. Проверьте интернет.",
                retry: "🔄 Попробовать еще раз"
            },
            es: {
                sessionError: "Error de sesión",
                sessionErrorMsg: "No se pudo identificar su solicitud. El enlace ha caducado o se abrió incorrectamente. Regrese al bot y presione el botón de descarga nuevamente.",
                sending: "Enviando su video al chat...",
                pleaseWait: "Por favor, espere...",
                success: "✅ Video enviado al chat con éxito!",
                returning: "Volviendo al bot...",
                error: "Error",
                errorMsg: "❌ No se pudo entregar el video",
                networkError: "Error de red",
                networkErrorMsg: "❌ No se pudo conectar al servidor. Verifique su conexión a Internet.",
                retry: "🔄 Reintentar"
            },
            zh: {
                sessionError: "会话错误",
                sessionErrorMsg: "无法确定您的请求。链接已过期或打开方式不正确。请返回机器人并再次点击下载按钮。",
                sending: "正在将您的视频发送到聊天...",
                pleaseWait: "请稍等...",
                success: "✅ 视频成功发送到聊天！",
                returning: "返回机器人...",
                error: "错误",
                errorMsg: "❌ 无法发放视频",
                networkError: "网络错误",
                networkErrorMsg: "❌ 无法连接到服务器。请检查您的互联网连接。",
                retry: "🔄 重试"
            },
            ar: {
                sessionError: "خطأ في الجلسة",
                sessionErrorMsg: "تعذر تحديد طلبك. رابط منتهي الصلاحية أو تم فتحه بشكل غير صحيح. ارجع إلى البوت واضغط على زر التحميل مرة أخرى.",
                sending: "إرسال الفيديو الخاص بك إلى الدردشة...",
                pleaseWait: "الرجاء الانتظار...",
                success: "✅ تم إرسال الفيديو إلى الدردشة بنجاح!",
                returning: "العودة إلى البوت...",
                error: "خطأ",
                errorMsg: "❌ فشل تسليم الفيديو",
                networkError: "خطأ في الشبكة",
                networkErrorMsg: "❌ تعذر الاتصال بالخادم. تحقق من اتصال الإنترنت.",
                retry: "🔄 إعادة المحاولة"
            }
        };

        // Функция для получения локализованного текста
        function t(key) {
            return translations[userLang]?.[key] || translations.en[key] || key;
        }

        // 🛑 Предохранитель: если нет валидного ymid — прерываем flow
        if (!rawYmid) {
            showErrorView(
                t('sessionError'),
                t('sessionErrorMsg'),
                false  // без Retry — сессия мертва
            );
            throw new Error("Missing ymid in URL");
        }

        const ymid = rawYmid;
        const apiBase = window.location.origin;

        // ========== УТИЛИТЫ ==========
        function cancelRetry() {
            if (retryTimerId) {
                clearTimeout(retryTimerId);
                retryTimerId = null;
            }
        }

        function stopPolling() {
            isPolling = false;
            if (pollTimeoutId) {
                clearTimeout(pollTimeoutId);
                pollTimeoutId = null;
            }
        }

        function updateRetryUI(count) {
            loaderText.innerText = "Loading Ad...";
            loaderSubtext.innerText = `Please wait... (${count}/${AD_CONFIG.maxRetries})`;
        }

        function showError(message) {
            loaderView.classList.add('hidden');
            contentView.classList.remove('hidden');
            document.getElementById('title').innerText = "Error";
            description.innerText = message;
            directBtn.classList.remove('hidden');
        }

        function showFinalUI(titleText, descText, showDirect) {
            loaderView.classList.add('hidden');
            contentView.classList.remove('hidden');
            document.getElementById('title').innerText = titleText;
            description.innerText = descText;
            if (showDirect) directBtn.classList.remove('hidden');
        }

        // ========== POLLING МЕХАНИЗМ ==========
        async function doPoll() {
            if (!isPolling) return;

            try {
                const res = await fetch(`${apiBase}/api/check-status?ymid=${ymid}`);
                const data = await res.json();

                if (data.status === 'verified') {
                    isPolling = false;
                    onAdSuccess();
                    return;
                }

                if (data.status === 'expired' || data.status === 'not_found') {
                    isPolling = false;
                    showError("Session expired. Please try again.");
                    return;
                }

                // Для SmartLink: если слишком много попыток
                if (currentAdSource === 'smartlink') {
                    smartLinkPollCount++;
                    if (smartLinkPollCount >= AD_CONFIG.maxSmartLinkPolls) {
                        isPolling = false;
                        showError("Ad verification may take longer with fallback. Please wait or try again later.");
                        return;
                    }
                }

                // Продолжаем polling
                pollTimeoutId = setTimeout(doPoll, AD_CONFIG.pollInterval);
            } catch (e) {
                // При ошибке сети ждём дольше
                pollTimeoutId = setTimeout(doPoll, AD_CONFIG.pollInterval * 2);
            }
        }

        function startPolling() {
            if (isPolling) return;
            isPolling = true;
            loaderText.innerText = "Waiting for verification...";
            loaderSubtext.innerText = "Please keep the app open";
            doPoll();
        }

        // ========== УРОВЕНЬ 1: SDK Ad ==========
        function trySDKAd() {
            if (typeof window[AD_CONFIG.sdkFn] === 'function') {
                loaderText.innerText = "Starting Ad";
                loaderSubtext.innerText = "Watch to support the bot!";
                currentAdSource = 'sdk';

                // ✅ ИСПРАВЛЕНО: Используем ymid + requestVar для аналитики
                window[AD_CONFIG.sdkFn]({
                    ymid: ymid,
                    requestVar: 'main_reward_button'
                })
                    .then(() => {
                        // Запускаем polling - сервер подтвердит, когда получит Postback
                        startPolling();
                    })
                    .catch((e) => {
                        console.error("Ad failed", e);
                        trySmartLink();
                    });
            } else {
                retryCount++;
                updateRetryUI(retryCount);

                if (retryCount >= AD_CONFIG.maxRetries) {
                    trySmartLink();
                    return;
                }
                retryTimerId = setTimeout(trySDKAd, AD_CONFIG.retryInterval);
            }
        }

        // ========== УРОВЕНЬ 2: SmartLink ==========
        function trySmartLink() {
            cancelRetry();
            currentAdSource = 'smartlink';
            smartLinkPollCount = 0;
            loaderText.innerText = "Opening ad in browser...";
            loaderSubtext.innerText = "Return here after watching";

            // Add ymid parameter to SmartLink for fallback tracking
            // Умное добавление inapp=1 + subid1 для встроенного браузера
            const rawSmartLink = AD_CONFIG.smartLink;
            const separator = rawSmartLink.includes('?') ? '&' : '?';
            const smartLinkUrl = `${rawSmartLink}${separator}ymid=${encodeURIComponent(ymid)}&subid1=${encodeURIComponent(ymid)}&inapp=1`;
            
            if (window.Telegram?.WebApp) {
                // КРИТИЧНО: try_instant_view: false
                // Отключаем Instant View, чтобы Monetag мог выполнить JS и цепочку редиректов
                window.Telegram.WebApp.openLink(smartLinkUrl, { try_instant_view: false });
            } else {
                window.open(smartLinkUrl, '_blank');
            }

            // ВАЖНО: Запускаем polling СРАЗУ
            startPolling();
        }

        // ========== АВТОМАТИЧЕСКАЯ ВЫДАЧА ВИДЕО ==========

        // 🔹 Функция 1: Отдельный fetch для claim (используется при успехе и при Retry)
        async function claimVideo() {
            // Показываем спиннер
            loaderView.classList.remove('hidden');
            contentView.classList.add('hidden');
            loaderText.innerText = t('sending');
            loaderSubtext.innerText = t('pleaseWait');
            
            tg.MainButton.hide();
            
            try {
                const claimRes = await fetch(`${apiBase}/api/claim-video`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ymid: ymid })
                });
                const claimData = await claimRes.json();
                
                if (claimData.success) {
                    // УСПЕХ: галочка + автозакрытие через 1.5с
                    loaderText.innerText = t('success');
                    loaderSubtext.innerText = t('returning');
                    
                    if (tg.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                    
                    setTimeout(() => {
                        tg.close();
                    }, 1500);
                } else {
                    // ОШИБКА: показываем content-view с Retry
                    showErrorView(t('error'), "❌ " + (claimData.error || t('errorMsg')), true);
                }
            } catch (e) {
                // СЕТЕВАЯ ОШИБКА
                console.error('Claim error:', e);
                showErrorView(t('networkError'), t('networkErrorMsg'), true);
            }
        }

        // 🔹 Функция 2: Вспомогательная для показа ошибки с кнопкой Retry
        function showErrorView(titleText, descriptionText, showRetry) {
            loaderView.classList.add('hidden');
            contentView.classList.remove('hidden');
            document.getElementById('title').innerText = titleText;
            description.innerText = descriptionText;
            
            if (showRetry) {
                directBtn.innerText = t('retry');
                directBtn.classList.remove('hidden');
                directBtn.onclick = function() {
                    directBtn.classList.add('hidden');
                    claimVideo(); // ВАЖНО: Только claimVideo(), БЕЗ рекурсии onAdSuccess
                };
            } else {
                directBtn.classList.add('hidden');
            }
        }

        // 🔹 Функция 3: Успех рекламы (вызывается после подтверждения polling-ом)
        function onAdSuccess() {
            stopPolling();
            cancelRetry();
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            
            // Сразу запускаем claim (без ручного клика!)
            claimVideo();
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        tg.ready();
        tg.expand();

        if (tg.themeParams.button_color) {
            document.documentElement.style.setProperty('--accent-color', tg.themeParams.button_color);
        }

        // Проверяем статус рекламы
        fetch(`${apiBase}/api/ads-status`)
            .then(response => response.json())
            .then(data => {
                if (data.enabled) {
                    loaderText.innerText = "Checking Status";
                    loaderSubtext.innerText = "Please wait a moment...";
                    trySDKAd();
                } else {
                    showFinalUI("Ready!", "Ads are currently disabled. You can go straight to the bot.", true);
                }
            })
            .catch(e => {
                console.error(e);
                showError("Could not reach the server.");
            });

        // Обработчик кнопки Start Ad Manually
        adBtn.addEventListener('click', () => {
            cancelRetry();
            stopPolling();
            retryCount = 0;
            smartLinkPollCount = 0;
            adBtn.classList.add('hidden');
            loaderView.classList.remove('hidden');
            contentView.classList.add('hidden');
            trySDKAd();
        });

        // Обработчик кнопки Continue to Bot
        directBtn.addEventListener('click', () => {
            tg.close();
        });

        // Visibility API: Мгновенный запрос при возврате в приложение
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isPolling) {
                clearTimeout(pollTimeoutId); // Отменяем ожидание
                doPoll(); // Делаем запрос ПРЯМО СЕЙЧАС
            }
        });
    </script>
</body>
</html>
