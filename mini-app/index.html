<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='11093538' data-sdk='show_11093538'></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            z-index: 10;
        }

        .glass-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 60px;
            border-radius: 16px;
            border: none;
            background-color: var(--accent-color);
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-success {
            background-color: var(--success-color);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.05);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .blob {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--accent-color);
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 1;
        }
        .blob-1 { top: 10%; left: -10%; }
        .blob-2 { bottom: 10%; right: -10%; background: #818cf8; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <!-- Persistent Loader -->
        <div id="loader-view" class="spinner-container">
            <div class="spinner"></div>
            <h2 id="loader-text" style="font-size: 18px; color: var(--text-primary); margin: 0;">Loading...</h2>
            <span id="loader-subtext" style="font-size: 14px; color: var(--text-secondary);">Connecting to servers</span>
        </div>

        <!-- Result Card -->
        <div id="content-view" class="glass-card hidden">
            <h1 id="title">Success!</h1>
            <p id="description">Your ad view has been verified. You can now claim your video.</p>
            
            <button id="ad-btn" class="btn hidden">🎬 Start Ad Manually</button>
            <button id="direct-btn" class="btn hidden">🚀 Continue to Bot</button>
            
            <div id="status-message" style="margin-top: 20px; font-size: 14px;"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        if (tg.themeParams.button_color) {
            document.documentElement.style.setProperty('--accent-color', tg.themeParams.button_color);
        }

        const loaderView = document.getElementById('loader-view');
        const loaderText = document.getElementById('loader-text');
        const loaderSubtext = document.getElementById('loader-subtext');
        
        const contentView = document.getElementById('content-view');
        const adBtn = document.getElementById('ad-btn');
        const directBtn = document.getElementById('direct-btn');
        const statusMsg = document.getElementById('status-message');
        const description = document.getElementById('description');

        const apiBase = window.location.origin;
        const urlParams = new URLSearchParams(window.location.search);
        const ymid = urlParams.get('ymid') || 'unknown_request';

        async function init() {
            try {
                loaderText.innerText = "Checking Status";
                const response = await fetch(`${apiBase}/api/ads-status`);
                const data = await response.json();
                
                if (data.enabled) {
                    loaderText.innerText = "Preparing Ad";
                    loaderSubtext.innerText = "Please wait a moment...";
                    startAdSequence();
                } else {
                    showFinalUI("Ready!", "Ads are currently disabled. You can go straight to the bot.", true);
                }
            } catch (e) {
                console.error(e);
                showFinalUI("Connection Error", "Could not reach the server.", true);
            }
        }

        function startAdSequence() {
            if (typeof show_11093538 === 'function') {
                loaderText.innerText = "Starting Ad";
                loaderSubtext.innerText = "Watch to support the bot!";
                
                show_11093538({ ymid: ymid })
                    .then(() => {
                        handleAdSuccess();
                    })
                    .catch((e) => {
                        console.error("Ad failed", e);
                        showFinalUI("Manual Start Required", "The automatic start was blocked.", false);
                        adBtn.classList.remove('hidden');
                    });
            } else {
                setTimeout(startAdSequence, 500);
            }
        }

        function handleAdSuccess() {
            showFinalUI("Verification Complete", "Your video is ready to be sent to your chat.", false);
            
            tg.MainButton.setText("🚀 GET VIDEO NOW");
            tg.MainButton.show();
            tg.MainButton.onClick(async () => {
                tg.MainButton.showProgress();
                try {
                    const claimRes = await fetch(`${apiBase}/api/claim-video`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ymid: ymid })
                    });
                    const claimData = await claimRes.json();
                    if (claimData.success) {
                        tg.close();
                    } else {
                        statusMsg.innerText = "❌ " + (claimData.error || "Verification expired. Try again.");
                        tg.MainButton.hideProgress();
                    }
                } catch (e) {
                    tg.close();
                }
            });

            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function showFinalUI(titleText, descText, showDirect) {
            loaderView.classList.add('hidden');
            contentView.classList.remove('hidden');
            document.getElementById('title').innerText = titleText;
            description.innerText = descText;
            if (showDirect) directBtn.classList.remove('hidden');
        }

        adBtn.addEventListener('click', () => {
            adBtn.classList.add('hidden');
            loaderView.classList.remove('hidden');
            startAdSequence();
        });

        directBtn.addEventListener('click', () => {
            tg.close();
        });

        init();
    </script>
</body>
</html>
